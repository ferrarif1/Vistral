services:
  vistral-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
    image: ${VISTRAL_API_IMAGE:-vistral-api:round1}
    container_name: vistral-api
    environment:
      API_PORT: 8787
      API_HOST: 0.0.0.0
      LLM_CONFIG_SECRET: ${LLM_CONFIG_SECRET:-replace-with-strong-secret}
      DEFAULT_USER_ID: ${DEFAULT_USER_ID:-u-1}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD:-mock-pass}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-mock-pass-admin}
      PADDLEOCR_RUNTIME_ENDPOINT: ${PADDLEOCR_RUNTIME_ENDPOINT:-}
      PADDLEOCR_RUNTIME_API_KEY: ${PADDLEOCR_RUNTIME_API_KEY:-}
      DOCTR_RUNTIME_ENDPOINT: ${DOCTR_RUNTIME_ENDPOINT:-}
      DOCTR_RUNTIME_API_KEY: ${DOCTR_RUNTIME_API_KEY:-}
      YOLO_RUNTIME_ENDPOINT: ${YOLO_RUNTIME_ENDPOINT:-}
      YOLO_RUNTIME_API_KEY: ${YOLO_RUNTIME_API_KEY:-}
      VITE_DEFAULT_LLM_BASE_URL: ${VITE_DEFAULT_LLM_BASE_URL:-https://api.chatanywhere.tech}
      VITE_DEFAULT_LLM_MODEL: ${VITE_DEFAULT_LLM_MODEL:-gpt-3.5-turbo}
    expose:
      - "8787"
    volumes:
      - vistral-data:/app/.data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  vistral-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-docker.m.daocloud.io/library/nginx:1.27-alpine}
    image: ${VISTRAL_WEB_IMAGE:-vistral-web:round1}
    container_name: vistral-web
    depends_on:
      vistral-api:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  vistral-data:
