# Codex model selection for primary implementation tasks.
model = "gpt-5.3-codex"

# Provider for the configured model.
model_provider = "openai"

# Secondary model used for review/check pass.
review_model = "gpt-5.3-codex"

# Keep reasoning effort balanced for everyday repo work.
model_reasoning_effort = "medium"

# Require no interactive approvals in this repository environment.
approval_policy = "never"

# Match repository execution environment: full local access.
sandbox_mode = "danger-full-access"
